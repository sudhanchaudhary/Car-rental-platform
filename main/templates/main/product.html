{% if product %}
{% for i in data %}
<div class="col-md-6 col-lg-4">

    <div class="vehicle-card shadow-sm rounded-4 overflow-hidden bg-white">

        <div class="vehicle-img">
            <img src="{{i.image.url}}" alt="">
        </div>

        <div class="p-3">

            <div class="d-flex justify-content-between align-items-start">
                <h6 class="fw-bold mb-1">{{i.brand}} {{i.model}}</h6>
                <span class="fw-bold text-primary">Rs. {{i.price_per_day}}/day</span>
            </div>

            <small class="text-muted d-block mb-2">
                Seats: {{i.seats}} · Mileage: {{i.milage}} · {{i.make}}
            </small>

            <div class="d-flex justify-content-between align-items-center mt-3">

                <a href="{% url 'vehicle_detail' i.id %}" class="btn btn-sm btn-outline-primary">View</a>

                <a href="{% url 'add_to_checkout' i.id %}">
                    <button class="btn btn-sm btn-primary px-3">
                        Book Now
                    </button>
                </a>

            </div>

        </div>
    </div>

</div>
{% endfor %}

{% else %}
<div class="alert alert-warning text-center">
    No vehicle found
</div>
{% endif %}
