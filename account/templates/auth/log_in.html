<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <!-- SEO -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to RentalHub and manage your bookings بسهولة.">
    <title>Login | RentalHub</title>
    <!-- logo -->
    <link rel="icon" href="{% static 'images/logo/favicon.ico' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/sign_up.css' %}">
</head>

<body>

    <section class="auth-wrapper">
        <div class="container">

            <div class="auth-container mx-auto">
                <div class="row g-0">

                    <!-- LEFT IMAGE -->
                    <div class="col-lg-6 d-none d-lg-block">
                        <div class="auth-image">
                            <img src="{% static 'images/r1f.jpg' %}" alt="Login Image">
                        </div>
                    </div>

                    <!-- RIGHT FORM -->
                    <div class="col-lg-6 d-flex align-items-center">
                        <div class="auth-form position-relative w-100">

                            <!-- Close -->
                            <a href="{% url 'home' %}" class="close-btn">
                                <i class="fa-solid fa-xmark"></i>
                            </a>

                            <!-- Brand -->
                            <div class="mb-4">
                                <h3 class="fw-bold text-center">
                                    <span class="text-dark">Rental</span><span class="text-primary">Hub</span>
                                </h3>
                            </div>

                            <!-- Form -->
                            <form method="POST" action="{% url 'log_in' %}">
                                {% csrf_token %}

                                <!-- Email -->
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                                </div>

                                <!-- Password -->
                                <div class="mb-3 position-relative">
                                    <label class="form-label">Password</label>
                                    <input type="password" name="password" id="loginPassword" class="form-control pe-5"
                                        placeholder="Enter password" required>
                                    <i class="fa-solid fa-eye toggle-password" data-target="loginPassword"></i>
                                </div>

                                <!-- Options -->
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div>
                                        <input type="checkbox" id="remember">
                                        <label for="remember" name="remember" class="small text-muted">Remember me</label>
                                    </div>

                                    <a href="{% url 'password_reset' %}" class="small">Forgot password?</a>
                                </div>

                                <!-- Button -->
                                <button type="submit" class="btn btn-primary w-100">
                                    Login
                                </button>

                                <!-- Divider -->
                                <div class="divider my-3 text-center">
                                    <span class="mx-auto">or continue with</span>
                                </div>

                                <!-- Social Login -->
                                <div class="social-login text-center gap-4 my-3">

                                    <a href="#" class="social-icon google">
                                        <i class="fa-brands fa-google"></i>
                                    </a>

                                    <a href="#" class="social-icon facebook">
                                        <i class="fa-brands fa-facebook-f"></i>
                                    </a>

                                </div>

                                <!-- Register -->
                                <p class="mt-3 small">
                                    Don't have an account?
                                    <a href="{% url 'sign_up' %}">Sign up</a>
                                </p>

                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </section>

    <!-- JS -->
    <script>
        document.querySelectorAll(".toggle-password").forEach(icon => {
            icon.addEventListener("click", function () {
                const input = document.getElementById(this.getAttribute("data-target"));

                if (input.type === "password") {
                    input.type = "text";
                    this.classList.replace("fa-eye", "fa-eye-slash");
                } else {
                    input.type = "password";
                    this.classList.replace("fa-eye-slash", "fa-eye");
                }
            });
        });
    </script>

</body>

</html>
