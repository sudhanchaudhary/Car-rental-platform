<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Change</title>
    <link rel="icon" href="{% static 'images/logo/favicon.ico' %}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- alertify CSS -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <style>
        label {
            color: #252525;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 10px;
            transition: 0.3s;
        }
    </style>
</head>

<body>

    <div class="container-fluid min-vh-100 d-flex align-items-center login-section">
        <div class="container">
            <div class="row mx-auto my-5 shadow-lg rounded-4 overflow-hidden main-wrapper">
                <!-- RIGHT PANEL -->
            
                    <h3 class="text-center my-5">Please click the link sent to your gmail to change the password.</h3>
                    
                
            </div>
        </div>
    </div>
    <!-- alertify JavaScript -->
    <script src="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>
    {% if messages %}
    {% for message in messages %}
    {% if message.tags == 'success' %}
    <script>
        alertify.set('notifier', 'position', 'bottom-right');
        alertify.success('{{message}}');
    </script>
    {% else %}
    <script>
        alertify.set('notifier', 'position', 'bottom-right');
        alertify.error('{{message}}');
    </script>
    {% endif %}
    {% endfor %}

    {% endif %}
</body>

</html>
