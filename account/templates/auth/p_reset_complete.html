<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>

    <link rel="icon" href="{% static 'images/logo/favicon.ico' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        body {
            background: linear-gradient(135deg, #e0ecff, #f8fbff);
        }

        .success-card {
            max-width: 420px;
            margin: auto;
            background: #ffffff;
            padding: 45px 30px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            transition: 0.3s;
        }

        .success-card:hover {
            transform: translateY(-3px);
        }

        .success-icon {
            width: 75px;
            height: 75px;
            background: #e0ecff;
            color: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }

        .success-title {
            font-weight: 600;
            color: #2563eb;
            margin-bottom: 10px;
        }

        .success-text {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .login-btn {
            background: #2563eb;
            color: #ffffff;
            border-radius: 10px;
            padding: 12px;
            border: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .login-btn:hover {
            background: #1e4ed8;
        }

        .subtle-link {
            display: block;
            margin-top: 15px;
            font-size: 13px;
            color: #9ca3af;
            text-decoration: none;
        }

        .subtle-link:hover {
            color: #2563eb;
        }
    </style>

</head>

<body>

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">

    <div class="success-card">

        <!-- Icon -->
        <div class="success-icon">
            <i class="fa-solid fa-check"></i>
        </div>

        <!-- Title -->
        <h4 class="success-title">
            Password Reset Successful
        </h4>

        <!-- Subtitle -->
        <p class="success-text">
            Your password has been updated successfully. You can now log in using your new credentials.
        </p>

        <!-- Button -->
        <a href="{% url 'log_in' %}">
            <button class="btn login-btn w-100">
                Continue to Login
            </button>
        </a>

        <!-- Optional secondary action -->
        <a href="{% url 'home' %}" class="subtle-link">
            Back to Home
        </a>

    </div>

</div>

</body>
</html>
