<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <!-- SEO -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your RentalHub account and start renting or listing vehicles بسهولة.">
    <title>Register | RentalHub</title>
    
    <!-- logo -->
    <link rel="icon" href="{% static 'images/logo/favicon.ico' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/sign_up.css' %}">
</head>

<body>

    <section class="auth-wrapper d-flex align-items-center justify-content-center">
        <div class="container">

            <div class="auth-container mx-auto">
                <div class="row g-0">

                    <!-- LEFT IMAGE -->
                    <div class="col-lg-6 d-none d-lg-block">
                        <div class="auth-image">
                            <img src="{% static 'images/r1.jpg' %}" alt="Register Image">
                        </div>
                    </div>

                    <!-- RIGHT FORM -->
                    <div class="col-lg-6 d-flex align-items-center">
                        <div class="auth-form position-relative w-100">

                            <!-- Close Button -->
                            <a href="{% url 'home' %}" class="close-btn">
                                <i class="fa-solid fa-xmark"></i>
                            </a>

                            <!-- Brand -->
                            <div class="mb-4">
                                <h3 class="fw-bold">
                                    <span class="text-dark">Rental</span><span class="text-primary">Hub</span>

                                </h3>
                                <p class="text-muted">Create your account</p>
                            </div>

                            <!-- Form -->
                            <form method="POST" action="{% url 'sign_up' %}">
                                {% csrf_token %}

                                <div class="mb-3">
                                    <div class="d-flex gap-2">
                                        <div class="w-100">
                                            <label class="form-label">First Name</label>
                                            <input type="text" name="f_name" class="form-control" placeholder="First name" required>
                                        </div>

                                        <div class="w-100">
                                            <label class="form-label">Last Name</label>
                                            <input type="text" name="l_name" class="form-control" placeholder="Last name" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                                </div>

                                <!-- Password -->
                                <div class="mb-3 position-relative">
                                    <label class="form-label">Password</label>
                                    <input type="password" id="password" name="password" class="form-control pe-5"
                                        placeholder="Enter password" required>
                                    <i class="fa-solid fa-eye toggle-password" data-target="password"></i>

                                    <!-- Rules -->
                                    <small id="password-rules" class="text-muted">
                                        Must be 8+ chars, include uppercase, number, special character
                                    </small>

                                    <small id="password-error" class="text-danger d-none">
                                        Password is not strong enough
                                    </small>
                                </div>

                                <!-- Confirm Password -->
                                <div class="mb-3 position-relative">
                                    <label class="form-label">Confirm Password</label>
                                    <input type="password" id="confirmPassword" name="cpassword" class="form-control pe-5"
                                        placeholder="Confirm password">
                                    <i class="fa-solid fa-eye toggle-password" data-target="confirmPassword"></i>

                                    <small id="confirm-error" class="text-danger d-none">
                                        Passwords do not match
                                    </small>
                                </div>

                                <button id="submitBtn" type="submit" class="btn btn-primary w-100 mt-2">
                                    Create Account
                                </button>

                                <p class="mt-3 small">
                                    Already have an account?
                                    <a href="{% url 'log_in' %}">Sign in</a>
                                </p>
                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </section>

    <!-- password toggle js -->
    <script>
        document.querySelectorAll(".toggle-password").forEach(icon => {
            icon.addEventListener("click", function () {
                const input = document.getElementById(this.getAttribute("data-target"));

                if (input.type === "password") {
                    input.type = "text";
                    this.classList.remove("fa-eye");
                    this.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    this.classList.remove("fa-eye-slash");
                    this.classList.add("fa-eye");
                }
            });
        });
    </script>

    <!-- strong password -->
    <script>
        const passwordInput = document.getElementById("password");
        const confirmInput = document.getElementById("confirmPassword");

        const errorText = document.getElementById("password-error");
        const confirmError = document.getElementById("confirm-error");

        const submitBtn = document.getElementById("submitBtn");

        // Strong password check
        function isStrongPassword(password) {
            return (
                password.length >= 8 &&
                /[A-Z]/.test(password) &&
                /[0-9]/.test(password) &&
                /[^A-Za-z0-9]/.test(password)
            );
        }

        // Check both conditions
        function validateForm() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            let isValid = true;

            // Strength check
            if (!isStrongPassword(password)) {
                errorText.classList.remove("d-none");
                passwordInput.style.borderColor = "#ef4444";
                isValid = false;
            } else {
                errorText.classList.add("d-none");
                passwordInput.style.borderColor = "#22c55e";
            }

            // Match check
            if (confirm && password !== confirm) {
                confirmError.classList.remove("d-none");
                confirmInput.style.borderColor = "#ef4444";
                isValid = false;
            } else {
                confirmError.classList.add("d-none");
                if (confirm) confirmInput.style.borderColor = "#22c55e";
            }

            // Enable/disable button
            submitBtn.disabled = !isValid;
        }

        // Disable initially
        submitBtn.disabled = true;

        // Events
        passwordInput.addEventListener("input", validateForm);
        confirmInput.addEventListener("input", validateForm);

        // Prevent submit if invalid
        document.querySelector("form").addEventListener("submit", function (e) {
            if (submitBtn.disabled) {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
