<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Change</title>

    <link rel="icon" href="{% static 'images/logo/favicon.ico' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- alertify CSS -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css" />

    <style>
        body {
            background: linear-gradient(135deg, #e0ecff, #f8fbff);
        }

        .main-wrapper {
            max-width: 450px;
            margin: auto;
            border-radius: 16px;
        }

        .form-title {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        label {
            font-weight: 500;
            color: #374151;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            padding: 12px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .login-btn {
            background: #2563eb;
            color: #fff;
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
            transition: 0.3s;
            border: none;
        }

        .login-btn:hover {
            color: white;
            background: #1e4ed8;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 22px;
            color: #9ca3af;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        .register-link {
            color: #2563eb;
            font-weight: 500;
            text-decoration: none;
        }

        .register-link:hover {
            text-decoration: underline;
        }

        .form-box {
            padding: 40px 30px;
        }

        .icon-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .icon-header i {
            font-size: 40px;
            color: #2563eb;
            background: #e0ecff;
            padding: 15px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="shadow-lg bg-white main-wrapper">

            <div class="position-relative form-box">

                <a href="{% url 'home' %}" class="close-btn">
                    <i class="fa-solid fa-circle-xmark"></i>
                </a>

                <div class="icon-header">
                    <i class="fa-solid fa-key"></i>
                </div>

                <h3 class="text-center mb-3 form-title" style="color:#2563eb;">
                    Reset Password
                </h3>

                <p class="text-center text-muted mb-4" style="font-size: 14px;">
                    Enter your email and we’ll send you a reset link.
                </p>

                <form method="POST">
                    {% csrf_token %}
                    {{form}}

                    <button type="submit" class="btn login-btn w-100 mt-3">
                        Send Reset Link
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">
                        Don't have an account?
                        <a href="{% url 'sign_up' %}" class="register-link">Register</a>
                    </small>
                </div>

            </div>
        </div>
    </div>

    <!-- alertify JavaScript -->
    <script src="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>

    {% if messages %}
    {% for message in messages %}
    {% if message.tags == 'success' %}
    <script>
        alertify.set('notifier', 'position', 'bottom-right');
        alertify.success('{{message}}');
    </script>
    {% else %}
    <script>
        alertify.set('notifier', 'position', 'bottom-right');
        alertify.error('{{message}}');
    </script>
    {% endif %}
    {% endfor %}
    {% endif %}

</body>
</html>
