{% extends "base.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/pchange.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
{% endblock css %}

{% block content %}

<div class="password-wrapper">
    <div class="password-card">

        <h2>Change Password</h2>
        <p class="subtitle">Update your account password securely</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" onsubmit="return validatePassword()">
            {% csrf_token %}

            <div class="input-group">
                <label>Old Password</label>
                <div class="input-box">
                    <input type="password" id="old_password" name="old_password" placeholder="Enter old password" required>
                    <i class="fa fa-eye toggle" onclick="togglePassword('old_password', this)"></i>
                </div>
            </div>

            <div class="input-group">
                <label>New Password</label>
                <div class="input-box">
                    <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required>
                    <i class="fa fa-eye toggle" onclick="togglePassword('new_password', this)"></i>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm New Password</label>
                <div class="input-box">
                    <input type="password" id="c_new_password" name="c_new_password" placeholder="Confirm new password" required>
                    <i class="fa fa-eye toggle" onclick="togglePassword('c_new_password', this)"></i>
                </div>
            </div>

            <button type="submit">Update Password</button>

        </form>
    </div>
</div>

<script>
function togglePassword(id, icon) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

// Strong password validation
function validatePassword() {
    const password = document.getElementById("new_password").value;
    const confirm = document.getElementById("c_new_password").value;

    // Strong password rule
    const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

    if (!strongRegex.test(password)) {
        alert("Password must be at least 8 characters long and include uppercase, lowercase, number, and special character.");
        return false;
    }

    if (password !== confirm) {
        alert("Passwords do not match!");
        return false;
    }

    return true;
}
</script>

{% endblock content %}
